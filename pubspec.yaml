name: pest_scan_ir
description: اپلیکیشن تشخیص آفات قرنطینه‌ای ایران با هوش مصنوعی
publish_to: 'none'
version: 3.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  
  # TensorFlow Lite برای طبقه‌بندی تصاویر
  tflite_flutter: ^0.11.0
  
  # انتخاب تصویر از دوربین و گالری
  image_picker: ^0.8.8+6
  
  # مدیریت حالت‌ها
  provider: ^6.1.2
  
  # مسیرهای فایل
  path_provider: ^2.1.5
  
  # پردازش تصویر
  image: ^4.3.0
  
  # محلی‌سازی فارسی
  flutter_localizations:
    sdk: flutter
  
  # آیکون‌های iOS
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/best_saved_model.tflite
  
  fonts:
    - family: Vazir
      fonts:
        - asset: assets/fonts/Vazir-Regular.ttf
        - asset: assets/fonts/Vazir-Bold.ttf
          weight: 700